name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance/compute/location?api-version=2017-04-02&format=text"
      - run: |
          wget https://github.com/cloudflare/cloudflared/releases/download/2026.3.0/cloudflared-linux-arm64
          chmod +x cloudflared-linux-arm64
          ./cloudflared-linux-arm64 tunnel --hello-world
