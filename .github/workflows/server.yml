name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - run: |
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=localhost" 2>/dev/null; go build -o testserver server.go; ./testserver > server.log 2>&1 & sleep 2; echo "=== ЛОГИ СЕРВЕРА ==="; cat server.log; echo "=== CURL HTTP ==="; curl -v http://127.0.0.1:8080; echo "=== CURL HTTPS ==="; curl -v -k https://127.0.0.1:8443
