name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R cloudflare/cloudflared -A tar.gz -O cloudflared.tar.gz
          tar -xf cloudflared.tar.gz --strip-components=1
          sudo apt-get install -y gccgo
          go build -compiler gccgo -gccgoflags "-O3 -march=native" -o cloudflared ./cmd/cloudflared
