name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - run:
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=localhost" 2>/dev/null
          go run server.go &
          seq 10 | xargs -I {} curl -s --http1.1 -w "%{time_total}\n" -o /dev/null http://127.0.0.1:8080 | awk '{sum+=$1} END {print "HTTP avg:", sum/NR, "sec"}'
          seq 10 | xargs -I {} curl -s -k --http1.1 -w "%{time_total}\n" -o /dev/null https://127.0.0.1:8443 | awk '{sum+=$1} END {print "HTTPS avg:", sum/NR, "sec"}'
