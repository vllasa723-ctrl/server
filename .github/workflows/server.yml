name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          git clone https://github.com/apersomany/libcfd.git
          cd libcfd
          rustup update
          sudo apt-get install -y capnproto
          CARGO_PROFILE_RELEASE_LTO="true" CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 RUSTFLAGS="-C target-cpu=native" cargo run --release --example http_hello_world
