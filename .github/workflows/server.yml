name: Benchmark Go vs GCCGO
on:
  push:
  workflow_dispatch:

jobs:
  build-and-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gccgo-15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gccgo-15

      - name: Create CPU-bound Go project
        run: |
          cat << 'EOF' > main.go
          package main
          import "fmt"
          func main() {
            count := 0
            for i := 2; i < 500000; i++ {
              isPrime := true
              for j := 2; j*j <= i; j++ {
                if i%j == 0 {
                  isPrime = false
                  break
                }
              }
              if isPrime {
                count++
              }
            }
            fmt.Println("Result:", count)
          }
          EOF

      - name: Build with official Go compiler
        run: go build -o bin_gc main.go

      - name: Build with gccgo-15
        run: GCCGO=gccgo-15 go build -compiler gccgo -gccgoflags "-O3 -flto=auto -march=native" -o bin_gccgo main.go

      - name: Run benchmark (Official Go)
        run: time ./bin_gc

      - name: Run benchmark (GCCGO)
        run: time ./bin_gccgo

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: |
            bin_gc
            bin_gccgo
