name: Build cloudflared
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: cloudflare/cloudflared
          ref: '2024.8.0'
      - run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15 gccgo-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/gccgo gccgo /usr/bin/gccgo-15 100
          GO_BIN=$(find /usr/bin -name '*go-15' | grep -v gccgo | head -n 1)
          sudo update-alternatives --install /usr/bin/go go $GO_BIN 100
      - run: |
          export GOTOOLCHAIN=local
          go mod edit -toolchain=none
          rm -rf vendor
          go mod tidy
          export CGO_ENABLED=1
          export CC=gcc
          go build -compiler gccgo -gccgoflags="-O3 -flto=auto -march=native" -o cloudflared ./cmd/cloudflared
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflared
          path: cloudflared
