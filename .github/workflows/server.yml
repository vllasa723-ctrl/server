name: Benchmark Compiler Performance
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install Compilers
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
      - name: Create Source Code
        run: |
          cat << 'EOF' > bench.c
          #include <stdio.h>
          #include <stdint.h>
          #include <time.h>

          uint64_t compute(uint64_t n) {
              uint64_t steps = 0;
              while (n > 1) {
                  if (n % 2 == 0) {
                      n /= 2;
                  } else {
                      n = 3 * n + 1;
                  }
                  steps++;
              }
              return steps;
          }

          int main() {
              struct timespec start, end;
              clock_gettime(CLOCK_MONOTONIC, &start);

              uint64_t total = 0;
              for (uint64_t i = 1; i <= 100000000; i++) {
                  total += compute(i);
              }

              clock_gettime(CLOCK_MONOTONIC, &end);
              double time_spent = (end.tv_sec - start.tv_sec) + (end.tv_nsec - start.tv_nsec) / 1e9;

              printf("Result: %lu\n", total);
              printf("Time: %f seconds\n", time_spent);
              return 0;
          }
          EOF
      - name: Compile and Run GCC 15
        run: |
          gcc-15 -O3 -flto -march=native bench.c -o bench_gcc
          echo "=== GCC 15 ==="
          ./bench_gcc
      - name: Compile and Run LLVM 22
        run: |
          clang-22 -O3 -flto -march=native bench.c -o bench_clang
          echo "=== Clang 22 ==="
          ./bench_clang
