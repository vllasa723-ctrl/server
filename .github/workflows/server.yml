name: Benchmark Go vs GCCGO
on:
  push:
  workflow_dispatch:

jobs:
  build-and-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gccgo-15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gccgo-15

      - name: Clone target project
        run: git clone https://github.com/boyter/scc.git target-project

      - name: Build with official Go compiler
        working-directory: target-project
        run: go build -o ../bin_gc .

      - name: Build with gccgo-15
        working-directory: target-project
        run: GCCGO=gccgo-15 go build -compiler gccgo -gccgoflags "-O3 -flto=auto -march=native" -o ../bin_gccgo .

      - name: Prepare test workload
        run: git clone --depth 1 https://github.com/redis/redis.git test-workload

      - name: Run benchmark (Official Go)
        run: time ./bin_gc test-workload

      - name: Run benchmark (GCCGO)
        run: time ./bin_gccgo test-workload

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: |
            bin_gc
            bin_gccgo
