name: Benchmark Go vs GCCGO
on:
  push:
  workflow_dispatch:

jobs:
  build-and-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gccgo-15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gccgo-15

      - name: Clone pure Go project (gojq)
        run: git clone --depth 1 https://github.com/itchyny/gojq.git target-project

      - name: Build with official Go compiler
        working-directory: target-project
        run: go build -o ../bin_gc ./cmd/gojq

      - name: Build with gccgo-15
        working-directory: target-project
        run: GCCGO=gccgo-15 go build -compiler gccgo -gccgoflags "-O3 -flto=auto -march=native" -o ../bin_gccgo ./cmd/gojq

      - name: Prepare test workload
        run: wget https://raw.githubusercontent.com/json-iterator/test-data/master/large-file.json -O test.json

      - name: Run benchmark (Official Go)
        run: time ./bin_gc '.[] | select(.type == "PushEvent") | .actor.login' test.json > /dev/null

      - name: Run benchmark (GCCGO)
        run: time ./bin_gccgo '.
