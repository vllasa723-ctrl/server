name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - run: |
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=localhost" 2>/dev/null; go build -o testserver server.go; ./testserver > server.log 2>&1 & sleep 3; echo -e "\n=== HTTP ==="; curl -w "TCP Connect: %{time_connect}s\nTTFB: %{time_starttransfer}s\nTotal Time: %{time_total}s\n" -o /dev/null -s http://127.0.0.1:8080; echo -e "\n=== HTTPS ==="; curl -k -w "TCP Connect: %{time_connect}s\nTLS Handshake: %{time_appconnect}s\nTTFB: %{time_starttransfer}s\nTotal Time: %{time_total}s\n" -o /dev/null -s https://127.0.0.1:8443
