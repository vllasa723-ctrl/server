name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R cloudflare/cloudflared -A tar.gz -O cloudflared.tar.gz
          tar -xf cloudflared.tar.gz --strip-components=1
          sudo apt-get install -y gccgo
          GCCGO="gccgo -O3 -march=native" GOFLAGS="-compiler=gccgo" make cloudflared
