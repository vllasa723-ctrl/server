name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - run: |
          sudo apt-get install hping3
          curl -s http://ip-api.com/line/
          sudo hping3 -S -p 443 -c 4 77.88.8.8
