name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          sudo add-apt-repository -y --no-update ppa:ubuntu-toolchain-r/test
          sudo sed -i 's/ppa.launchpadcontent.net/ppa.launchpad.net/g' /etc/apt/sources.list.d/ubuntu-toolchain-r*.list
          sudo sed -i 's/http:/https:/g' /etc/apt/sources.list.d/ubuntu-toolchain-r*.list
          sudo apt-get update
