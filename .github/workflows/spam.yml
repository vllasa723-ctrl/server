name: serversiz
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance/compute/location?api-version=2021-02-01&format=text"
      - name: Start
        run: |
          dd if=/dev/urandom of=test_3mb.bin bs=1M count=3
          curl -w "\nВремя: %{time_total} сек\nКод: %{http_code}\n" \
          -o /dev/null -s -X POST --data-binary @test_3mb.bin http://lscf.eu.cc/
          sudo apt-get update
          sudo apt-get install -y hey
          hey -n 1000 -c 20 -m POST -D test_3mb.bin http://lscf.eu.cc/
