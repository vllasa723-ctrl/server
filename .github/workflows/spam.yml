name: Benchmark Throughput Parallel

on:
  push:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - run: |
          curl -s -H Metadata:true --noproxy "*" "http://169.254.169.254/metadata/instance?api-version=2021-02-01&format=text"
          lscpu

          cat << 'EOF' > benchmark_test.go
          package main

          import "testing"

          func BenchmarkBytesThroughputParallel(b *testing.B) {
          	size := 100 * 1024 * 1024
          	b.SetBytes(int64(size))
          	b.ResetTimer()
          	
          	b.RunParallel(func(pb *testing.PB) {
          		data := make([]byte, size)
          		for pb.Next() {
          			for j := 0; j < size; j++ {
          				data[j] ^= 1
          			}
          		}
          	})
          }
          EOF
          
          go mod init bench
          go test -bench=. -benchtime=5s
