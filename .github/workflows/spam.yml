name: Benchmark Throughput

on:
  push:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - run: |
          cat << 'EOF' > benchmark_test.go
          package main

          import "testing"

          func BenchmarkBytesThroughput(b *testing.B) {
          	size := 100 * 1024 * 1024
          	data := make([]byte, size)
          	
          	b.SetBytes(int64(size))
          	b.ResetTimer()
          	
          	for i := 0; i < b.N; i++ {
          		for j := 0; j < size; j++ {
          			data[j] ^= 1
          		}
          	}
          }
          EOF
          
          go mod init bench
          go test -bench=. -benchtime=5s
